<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0e6dd8">
  <title>תרגול CPL — יטכ כנף קבועה</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="topbar">
    <button id="back-btn" class="link-btn" hidden>← חזרה</button>
    <h1 id="title">תרגול CPL</h1>
    <span id="progress" class="progress" hidden></span>
  </header>

  <main id="app">
    <section id="screen-home" class="screen">
      <p class="lead">בחר מצב תרגול</p>
      <div class="mode-grid">
        <button class="mode-card" data-mode="practice">
          <span class="mode-emoji">📝</span>
          <span class="mode-title">תרגול חופשי</span>
          <span class="mode-sub">תשובה ופידבק מיידי</span>
        </button>
        <button class="mode-card" data-mode="exam">
          <span class="mode-emoji">🎯</span>
          <span class="mode-title">סימולציית מבחן</span>
          <span class="mode-sub">30 שאלות, סף מעבר 75%</span>
        </button>
        <button class="mode-card" data-mode="srs">
          <span class="mode-emoji">🧠</span>
          <span class="mode-title">שאלות חלשות</span>
          <span class="mode-sub">חזרה מבוססת קופסאות לייטנר</span>
        </button>
        <button class="mode-card" data-mode="stats">
          <span class="mode-emoji">📊</span>
          <span class="mode-title">סטטיסטיקה</span>
          <span class="mode-sub">התקדמות אישית לפי נושא</span>
        </button>
      </div>

      <div id="topic-picker" class="topic-picker"></div>

      <p class="meta" id="bank-meta"></p>
    </section>

    <section id="screen-quiz" class="screen" hidden>
      <article id="question-card" class="question-card"></article>
      <footer class="quiz-actions">
        <button id="submit-btn" class="primary" disabled>בדיקה</button>
        <button id="next-btn" class="primary" hidden>הבא ←</button>
      </footer>
    </section>

    <section id="screen-summary" class="screen" hidden>
      <div id="summary-card" class="summary-card"></div>
    </section>

    <section id="screen-stats" class="screen" hidden>
      <div id="stats-card" class="summary-card"></div>
    </section>
  </main>

  <script src="data/questions.js"></script>
  <script src="js/store.js"></script>
  <script src="js/modes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
